name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx PyQt5 Pillow
          pip install PyQt-Fluent-Widgets

      - name: Determine version
        id: version
        run: |
          $version = Get-Date -Format "yyyy.MM.dd-HHmmss"
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build executable
        run: |
          pyinstaller tikulocal.spec --clean
          mv dist/tikulocal/tikulocal.exe dist/tikulocal/tikulocal-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tikulocal/tikulocal-windows.exe
          draft: false
          prerelease: false
          release_name: "tikulocal ${{ env.VERSION }}"
          tag: "v${{ env.VERSION }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
