name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx PyQt5 Pillow
          pip install PyQt-Fluent-Widgets

      - name: Get version
        id: version
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          echo "version=$date" >> $env:GITHUB_OUTPUT

      - name: Build executable
        run: |
          pyinstaller tikulocal.spec --clean
          mv dist/tikulocal/tikulocal.exe dist/tikulocal/tikulocal-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tikulocal/tikulocal-windows.exe
          draft: false
          prerelease: false
          release_name: tikulocal v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
