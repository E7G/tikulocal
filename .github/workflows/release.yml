name: Auto Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current time
        id: time
        run: echo "time=$(date +'%Y%m%d%H%M%S')" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx PyQt5 Pillow
          pip install PyQt-Fluent-Widgets

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name tikulocal --icon=icon.png --add-data "icon.png;." --hidden-import=qfluentwidgets --hidden-import=qfluentwidgets.common --hidden-import=qfluentwidgets.components --hidden-import=qfluentwidgets.components.widgets --hidden-import=PyQt5.sip --hidden-import=docx --hidden-import=docx.shared --hidden-import=docx.enum --hidden-import=lxml --hidden-import=lxml.etree --hidden-import=PIL main.py

      - name: Automatic Releases
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: v${{ steps.time.outputs.time }}
          prerelease: false
          title: tikulocal v${{ steps.time.outputs.time }}
          files: dist/tikulocal.exe
