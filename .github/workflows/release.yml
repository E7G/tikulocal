name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: tikulocal-windows

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx qfluentwidgets PyQt5

      - name: Install pip requirements
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller tikulocal.spec --clean

      - name: Rename artifact
        shell: bash
        run: |
          cd dist/tikulocal
          if [ -f tikulocal.exe ]; then
            mv tikulocal.exe tikulocal-windows.exe
            ls -la
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/tikulocal/tikulocal-windows.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: |
          find artifacts -type f -ls

      - name: Prepare files for release
        run: |
          mkdir -p release
          cp -r artifacts/*/* release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
