name: Auto Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx PyQt5 Pillow
          pip install PyQt-Fluent-Widgets

      - name: Build executable
        run: |
          pyinstaller tikulocal.spec --clean
          mv dist/tikulocal/tikulocal.exe dist/tikulocal/tikulocal-windows.exe

      - name: Automatic Releases
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: false
          title: tikulocal Latest Release
          files: dist/tikulocal/tikulocal-windows.exe
